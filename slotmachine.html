<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin to Win! — Candlekeep Mysteries</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=IM+Fell+English+SC&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">

  <header class="site-header">
    <div class="header-ornament">&#10023;</div>
    <h1 class="site-title">Spin to Win!</h1>
    <p class="site-subtitle">Pull the lever and tempt the reliquary's fortune</p>
    <div class="header-ornament">&#10023;</div>
  </header>

  <nav class="site-nav" id="site-nav"></nav>
  <script src="js/nav.js"></script>

  <section class="generator-panel">
    <label style="font-family:'IM Fell English SC', serif; font-size:1.1rem;">Rarities to draw from</label>
    <div class="rarity-checklist" id="rarityChecklist"></div>

    <div class="slot-machine">
      <div class="slot-reels">
        <div class="slot-payline" aria-hidden="true"></div>
        <div class="slot-window"><div class="slot-strip" id="reel0"></div></div>
        <div class="slot-window"><div class="slot-strip" id="reel1"></div></div>
        <div class="slot-window"><div class="slot-strip" id="reel2"></div></div>
      </div>
      <div class="slot-lever" id="slotLever" aria-hidden="true">
        <div class="slot-lever-track"><div class="slot-lever-knob"></div></div>
      </div>
    </div>

    <button class="roll-button" id="spinButton" type="button">Pull the Lever</button>
    <p class="spin-stats" id="spinStats">Pulls: 0 &middot; Jackpots: 0</p>

    <div class="reveal-area" id="revealArea" aria-live="polite">
      <p class="reveal-placeholder">The reels sit still... pull the lever to test your luck.</p>
    </div>

    <div class="roll-history" id="rollHistory" hidden>
      <h3>Jackpot History</h3>
      <ul id="rollHistoryList"></ul>
    </div>
  </section>

  <footer class="site-footer">
    <p>What fate deals, fate does not take back. Pull responsibly.</p>
  </footer>

</div>

<script src="js/slotmachine.js"></script>
</body>
</html>
