<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Item Compendium — Candlekeep Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=IM+Fell+English+SC&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">

  <header class="site-header">
    <div class="header-ornament">&#10023;</div>
    <h1 class="site-title">Magic Item Compendium</h1>
    <p class="site-subtitle">Every magic item catalogued in the archive, searchable in one place</p>
    <div class="header-ornament">&#10023;</div>
  </header>

  <nav class="site-nav" id="site-nav"></nav>
  <script src="js/nav.js"></script>

  <section class="controls">
    <div class="control-group control-search">
      <label for="searchInput">Search by name</label>
      <input type="text" id="searchInput" placeholder="Search by name...">
    </div>
    <div class="control-group">
      <label for="typeFilter">Type</label>
      <select id="typeFilter"><option value="">All types</option></select>
    </div>
    <div class="control-group">
      <label for="rarityFilter">Rarity</label>
      <select id="rarityFilter"><option value="">All rarities</option></select>
    </div>
    <div class="control-group control-sale">
      <label for="attunementFilter">&nbsp;</label>
      <label class="checkbox-label">
        <input type="checkbox" id="attunementFilter">
        <span>Requires attunement only</span>
      </label>
    </div>
    <div class="control-group control-count">
      <span id="resultCount"></span>
    </div>
  </section>

  <main class="item-grid" id="itemGrid" aria-live="polite"></main>

  <p class="empty-state" id="emptyState" hidden>No items in the archive match your search.</p>

  <nav class="pagination" id="pagination" aria-label="Page navigation"></nav>

  <footer class="site-footer">
    <p>Compiled from the archive's ongoing survey of magic items great and small.</p>
  </footer>

</div>

<script src="js/compendium.js"></script>
</body>
</html>
