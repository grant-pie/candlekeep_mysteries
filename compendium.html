<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compendium — Candlekeep Mysteries</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=IM+Fell+English+SC&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">

  <header class="site-header">
    <div class="header-ornament">&#10023;</div>
    <h1 class="site-title">Compendium</h1>
    <p class="site-subtitle">Magic items carried by the party and monsters they've encountered, catalogued in one place</p>
    <div class="header-ornament">&#10023;</div>
  </header>

  <nav class="site-nav" id="site-nav"></nav>
  <script src="js/nav.js"></script>

  <div class="compendium-tabs" role="tablist">
    <button type="button" class="tab-btn active" id="itemsTabBtn" data-tab="items" role="tab" aria-selected="true" aria-controls="itemsView">Wondrous Items</button>
    <button type="button" class="tab-btn" id="monstersTabBtn" data-tab="monsters" role="tab" aria-selected="false" aria-controls="monstersView">Monsters</button>
  </div>

  <section class="compendium-view" id="itemsView" role="tabpanel">

    <main class="item-grid" id="itemGrid" aria-live="polite"></main>

    <p class="empty-state" id="emptyState" hidden>No items in the archive yet.</p>

    <nav class="pagination" id="pagination" aria-label="Page navigation"></nav>

  </section>

  <section class="compendium-view" id="monstersView" role="tabpanel" hidden>

    <div class="gallery-sessions" id="monsterSessions"></div>

    <p class="empty-state" id="monsterEmptyState" hidden>No monsters catalogued yet.</p>

  </section>

  <footer class="site-footer">
    <p>Collected from the adventurers of Candlekeep.</p>
  </footer>

</div>

<script src="js/compendium.js"></script>
</body>
</html>
