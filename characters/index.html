<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Characters — Candlekeep Mysteries</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=IM+Fell+English+SC&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="page">

  <header class="site-header">
    <div class="header-ornament">&#10023;</div>
    <h1 class="site-title">Characters</h1>
    <p class="site-subtitle">The adventurers whose fates are bound to Candlekeep</p>
    <div class="header-ornament">&#10023;</div>
  </header>

  <nav class="site-nav" id="site-nav" data-base="../"></nav>
  <script src="../js/nav.js"></script>

  <div id="grid" class="character-grid"></div>
  <p class="empty-state" id="emptyState" hidden>No characters yet. Add one to characters/js/characters-data.js.</p>

</div>

<script src="js/characters-data.js"></script>
<script>
  const grid = document.getElementById('grid');
  const emptyState = document.getElementById('emptyState');

  for (const character of CHARACTERS) {
    const a = document.createElement('a');
    a.className = 'character-card';
    a.href = `character.html?id=${encodeURIComponent(character.id)}`;

    const portraitWrap = document.createElement('div');
    portraitWrap.className = 'character-portrait-wrap';

    const img = document.createElement('img');
    img.className = 'character-portrait';
    img.alt = character.name;
    img.loading = 'lazy';
    img.onerror = () => { img.hidden = true; placeholder.hidden = false; };
    img.src = character.image;

    const placeholder = document.createElement('div');
    placeholder.className = 'character-portrait-placeholder';
    placeholder.hidden = true;
    placeholder.setAttribute('aria-hidden', 'true');
    placeholder.textContent = '\u{1F464}';

    portraitWrap.appendChild(img);
    portraitWrap.appendChild(placeholder);

    const name = document.createElement('div');
    name.className = 'character-card-name';
    name.textContent = character.name;

    a.appendChild(portraitWrap);
    a.appendChild(name);
    grid.appendChild(a);
  }

  emptyState.hidden = CHARACTERS.length > 0;
</script>
</body>
</html>
