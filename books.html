<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books — Candlekeep Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=IM+Fell+English+SC&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">

  <header class="site-header">
    <div class="header-ornament">&#10023;</div>
    <h1 class="site-title">Books</h1>
    <p class="site-subtitle">Every tome, journal, and scrap of writing your party has uncovered</p>
    <div class="header-ornament">&#10023;</div>
  </header>

  <nav class="site-nav" id="site-nav"></nav>
  <script src="js/nav.js"></script>

  <section class="controls">
    <div class="control-group control-count">
      <span id="resultCount"></span>
    </div>
  </section>

  <main class="book-grid" id="bookGrid" aria-live="polite"></main>

  <p class="empty-state" id="emptyState" hidden>No books have been catalogued yet.</p>

  <footer class="site-footer">
    <p>Catalogued from every dusty shelf, hidden vault, and abandoned satchel the party has emptied.</p>
  </footer>

</div>

<script src="js/books.js"></script>
</body>
</html>
