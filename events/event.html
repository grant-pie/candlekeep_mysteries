<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event — Candlekeep Mysteries</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=IM+Fell+English+SC&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="page">

  <header class="site-header">
    <div class="header-ornament">&#10023;</div>
    <h1 class="site-title" id="title">Event</h1>
    <div class="header-ornament">&#10023;</div>
  </header>

  <div class="event-page">
    <div class="image-frame">
      <img id="photo" alt="" hidden>
      <div class="image-frame-placeholder" hidden aria-hidden="true">&#128257;</div>
    </div>
    <div id="eventText" class="event-text"></div>
  </div>

</div>

<script src="js/events-data.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const event = EVENTS.find(e => e.id === id);
  const page = document.querySelector('.event-page');

  if (!event) {
    page.innerHTML = '<p class="empty-state">This event could not be found.</p>';
  } else {
    document.title = event.title + ' — Candlekeep Mysteries';
    document.getElementById('title').textContent = event.title;

    const photo = document.getElementById('photo');
    const placeholder = document.querySelector('.image-frame-placeholder');
    photo.alt = event.title;
    photo.onload = () => { photo.hidden = false; };
    photo.onerror = () => { placeholder.hidden = false; };
    photo.src = event.image;

    const textContainer = document.getElementById('eventText');
    for (const line of event.text) {
      const p = document.createElement('p');
      p.textContent = line;
      textContainer.appendChild(p);
    }
  }
</script>
</body>
</html>
