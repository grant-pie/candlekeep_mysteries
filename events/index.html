<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events — DM Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=IM+Fell+English+SC&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="page">

  <header class="site-header">
    <div class="header-ornament">&#10023;</div>
    <h1 class="site-title">Events</h1>
    <p class="site-subtitle">DM-only index — grab a link below and send it directly to your players</p>
    <div class="header-ornament">&#10023;</div>
  </header>

  <div id="list" class="dm-sessions"></div>

  <footer class="site-footer">
    <p>This page is not linked from the site navigation. Bookmark it for your own use.</p>
  </footer>

</div>

<script src="js/events-data.js"></script>
<script>
  const list = document.getElementById('list');

  for (const event of EVENTS) {
    const url = new URL(`event.html?id=${encodeURIComponent(event.id)}`, location.href).href;

    const row = document.createElement('div');
    row.className = 'dm-row';

    const label = document.createElement('span');
    label.className = 'dm-row-title';
    label.textContent = event.title;

    const viewLink = document.createElement('a');
    viewLink.className = 'dm-row-link';
    viewLink.href = `event.html?id=${encodeURIComponent(event.id)}`;
    viewLink.textContent = 'view';
    viewLink.target = '_blank';

    const copyBtn = document.createElement('button');
    copyBtn.type = 'button';
    copyBtn.className = 'dm-row-link';
    copyBtn.style.cssText = 'background:none;border:none;font:inherit;cursor:pointer;padding:0;';
    copyBtn.textContent = 'copy link';
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(url).then(() => {
        copyBtn.textContent = 'copied!';
        setTimeout(() => { copyBtn.textContent = 'copy link'; }, 1500);
      });
    });

    row.appendChild(label);
    row.appendChild(viewLink);
    row.appendChild(copyBtn);
    list.appendChild(row);
  }

  if (!EVENTS.length) {
    list.innerHTML = '<p class="empty-state">No events yet. Add one to events/js/events-data.js.</p>';
  }
</script>
</body>
</html>
